<!DOCTYPE html>
<html>
<head>
  <title>AI Networking Assistant</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
    }

    .header {
      text-align: center;
      padding: 15px;
      font-size: 22px;
      font-weight: bold;
      border-bottom: 1px solid #1e293b;
    }

    .container {
      max-width: 900px;
      margin: auto;
      display: flex;
      flex-direction: column;
      height: 90vh;
    }

    .chat-box {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
    }

    .message {
      margin: 10px 0;
      padding: 12px 15px;
      border-radius: 10px;
      max-width: 70%;
      line-height: 1.5;
      white-space: pre-wrap;
    }

    .user {
      background: #2563eb;
      margin-left: auto;
      text-align: right;
    }

    .bot {
      background: #334155;
      margin-right: auto;
    }

    .typing {
      font-style: italic;
      opacity: 0.7;
    }

    .input-area {
      padding: 10px;
      border-top: 1px solid #1e293b;
      background: #020617;
    }

    .input-wrapper {
      position: relative;
    }

    textarea {
      width: 100%;
      padding: 12px 60px 12px 12px;
      border-radius: 10px;
      border: none;
      outline: none;
      font-size: 14px;
      resize: none;
      height: 40px;
    }

    button {
      position: absolute;
      right: 5px;
      top: 5px;
      bottom: 5px;
      padding: 0 15px;
      background: #22c55e;
      border: none;
      color: white;
      border-radius: 8px;
      cursor: pointer;
    }

    button:hover {
      background: #16a34a;
    }
  </style>
</head>

<body>

<div class="header">
  🤖 AI Networking Assistant
</div>

<div class="container">

  <div class="chat-box" id="chatBox"></div>

  <div class="input-area">
    <div class="input-wrapper">
      <textarea id="message" placeholder="Type your message..."></textarea>
      <button onclick="send()">Send</button>
    </div>
  </div>

</div>

<script>
async function send() {
  const input = document.getElementById("message");
  const message = input.value.trim();
  const chatBox = document.getElementById("chatBox");

  if (!message) return;

  // User message
  chatBox.innerHTML += `<div class="message user">${message}</div>`;
  input.value = "";

  // Typing indicator
  const typingId = "typing-" + Date.now();
  chatBox.innerHTML += `<div id="${typingId}" class="message bot typing">AI is typing...</div>`;
  chatBox.scrollTop = chatBox.scrollHeight;

  try {
    const res = await fetch("https://ai-project-y6o5.onrender.com/chat", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ message, role: "Recruiter" })
    });

    const data = await res.json();

    // Remove typing
    document.getElementById(typingId).remove();

    // Bot reply
    chatBox.innerHTML += `<div class="message bot">${data.reply}</div>`;
    chatBox.scrollTop = chatBox.scrollHeight;

  } catch (err) {
    document.getElementById(typingId).remove();
    chatBox.innerHTML += `<div class="message bot">Error connecting to server</div>`;
  }
}

// ✅ Enter / Shift+Enter logic
document.getElementById("message").addEventListener("keydown", function(e) {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    send();
  }
});
</script>

</body>
</html>
